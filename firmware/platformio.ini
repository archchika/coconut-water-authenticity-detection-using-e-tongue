; E-Tongue ESP32 firmware — Phase 1.1 project setup
; https://docs.platformio.org/en/latest/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Build: include path for headers
build_flags =
    -I include
    -DCORE_DEBUG_LEVEL=1

; Upload speed (adjust if needed)
upload_speed = 921600

; Library dependencies (add as needed in later sub-phases)
; lib_deps =
